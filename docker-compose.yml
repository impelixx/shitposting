services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blogik
      POSTGRES_USER: blogik
      POSTGRES_PASSWORD: blogik
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogik"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started

volumes:
  postgres_data:
  meilisearch_data:
